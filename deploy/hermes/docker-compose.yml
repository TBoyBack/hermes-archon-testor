# Hermes Agent Docker Compose 部署配置
# 用于本地开发测试和生产环境部署

version: '3.8'

services:
  # Hermes Agent 主服务
  hermes:
    build:
      context: ../..
      dockerfile: deploy/hermes/Dockerfile
    container_name: hermes-agent
    restart: unless-stopped
    ports:
      - "8080:8080"  # HTTP API 端口
      - "8081:8081"  # WebSocket 端口
    environment:
      - HERMES_ENV=${HERMES_ENV:-development}
      - HERMES_LOG_LEVEL=${HERMES_LOG_LEVEL:-INFO}
      - HERMES_MODEL=${HERMES_MODEL:-gpt-4}
      - HERMES_API_KEY=${HERMES_API_KEY}
      - HERMES_BASE_URL=${HERMES_BASE_URL:-https://api.openai.com/v1}
      - HERMES_STORAGE_PATH=/app/hermes/data
      - HERMES_SKILLS_PATH=/app/hermes/skills
      - TZ=Asia/Shanghai
    volumes:
      - hermes-data:/app/hermes/data
      - hermes-logs:/app/hermes/logs
      - hermes-skills:/app/hermes/skills
      - hermes-cache:/app/hermes/cache
      # 挂载本地技能目录（开发模式）
      - ../../src/hermes:/app/hermes/src/hermes:ro
    networks:
      - hermes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis 缓存服务（Hermes 记忆存储）
  redis:
    image: redis:7-alpine
    container_name: hermes-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - hermes-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL 数据库（持久化存储）
  postgres:
    image: postgres:15-alpine
    container_name: hermes-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=hermes
      - POSTGRES_USER=hermes
      - POSTGRES_PASSWORD=${HERMES_DB_PASSWORD:-hermes_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - hermes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus 监控（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: hermes-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - hermes-network
    profiles:
      - monitoring

volumes:
  hermes-data:
    driver: local
  hermes-logs:
    driver: local
  hermes-skills:
    driver: local
  hermes-cache:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local

networks:
  hermes-network:
    driver: bridge
